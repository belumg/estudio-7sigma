<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>7 SIGMA — Próximamente</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:          #0B1628;
    --navy-mid:      #112240;
    --silver:        #C8D4E0;
    --silver-bright: #E8EEF4;
    --teal:          #1DD6BE;
    --teal-dim:      #0FA090;
    --ink:           #0B1628;
    --paper:         #FFFFFF;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--navy);
    color: var(--paper);
    font-family: 'Cormorant Garamond', serif;
    overflow: hidden;
    height: 100vh;
    cursor: none;
  }

  /* ── CURSOR ── */
  .cursor {
    width: 12px; height: 12px;
    background: var(--teal);
    border-radius: 50%;
    position: fixed; top: 0; left: 0;
    pointer-events: none; z-index: 9999;
    transform: translate(-50%,-50%);
    transition: transform .1s ease, width .3s, height .3s, background .3s;
    mix-blend-mode: difference;
  }
  .cursor-ring {
    width: 36px; height: 36px;
    border: 1px solid var(--teal);
    border-radius: 50%;
    position: fixed; top: 0; left: 0;
    pointer-events: none; z-index: 9998;
    transform: translate(-50%,-50%);
    transition: all .15s ease;
    opacity: .5;
  }

  /* ── CANVAS ── */
  #three-canvas {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
  }

  /* ── NAV ── */
  nav {
    position: fixed; top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 2rem 3rem;
  }
  .nav-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem; letter-spacing: .3em;
    color: var(--paper); text-decoration: none;
    position: relative;
  }
  .nav-logo::after {
    content: ''; display: block;
    height: 2px; background: var(--teal);
    width: 0; transition: width .4s ease;
  }
  .nav-logo:hover::after { width: 100%; }
  .nav-tag {
    font-family: 'Space Mono', monospace;
    font-size: .65rem; letter-spacing: .25em;
    color: var(--teal); opacity: .7;
  }

  /* ── ESCENA CENTRAL ── */
  .scene {
    position: relative; z-index: 10;
    height: 100vh;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    padding: 0 3rem;
    text-align: center;
  }

  .eyebrow {
    font-family: 'Space Mono', monospace;
    font-size: .65rem; letter-spacing: .35em;
    color: var(--teal);
    opacity: 0;
    animation: fadeUp 1s ease .4s forwards;
    margin-bottom: 1.4rem;
  }

  .main-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(4.5rem, 13vw, 12rem);
    line-height: .88; letter-spacing: -.01em;
    color: var(--paper);
    opacity: 0;
    animation: fadeUp 1s ease .6s forwards;
  }
  .main-title .outline-crimson {
    display: block;
    color: transparent;
    -webkit-text-stroke: 1px var(--silver);
  }
  .main-title .outline-teal {
    display: block;
    color: transparent;
    -webkit-text-stroke: 1px var(--teal);
  }

  .subtitle {
    max-width: 420px;
    font-size: 1.1rem; font-weight: 300; font-style: italic;
    line-height: 1.7; color: rgba(200,212,224,.8);
    margin-top: 2rem;
    opacity: 0;
    animation: fadeUp 1s ease .9s forwards;
  }

  /* ── LÍNEA LATERAL ── */
  .side-line {
    position: absolute;
    right: 3rem; bottom: 5rem;
    display: flex; flex-direction: column;
    align-items: center; gap: .5rem;
    opacity: 0;
    animation: fadeUp 1s ease 1.4s forwards;
  }
  .side-line span {
    font-family: 'Space Mono', monospace;
    font-size: .55rem; letter-spacing: .3em;
    writing-mode: vertical-rl;
    color: var(--paper); opacity: .4;
  }
  .side-line::after {
    content: ''; display: block;
    width: 1px; height: 80px;
    background: linear-gradient(to bottom, var(--silver), transparent);
  }

  /* ── BARRA INFERIOR ── */
  .bottom-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    z-index: 100;
    padding: 1.5rem 3rem;
    display: flex; justify-content: space-between; align-items: center;
    background: rgba(11,22,40,.8);
    backdrop-filter: blur(20px);
    border-top: 1px solid rgba(29,214,190,.12);
    opacity: 0;
    animation: fadeUp 1s ease 1.2s forwards;
  }
  .bottom-bar span {
    font-family: 'Space Mono', monospace;
    font-size: .6rem; letter-spacing: .18em;
    opacity: .3;
  }
  .bottom-bar a {
    font-family: 'Space Mono', monospace;
    font-size: .6rem; letter-spacing: .18em;
    color: var(--teal); opacity: .6;
    text-decoration: none; transition: opacity .3s;
  }
  .bottom-bar a:hover { opacity: 1; }

  /* ── ANIMACIONES ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(28px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 640px) {
    nav { padding: 1.5rem; }
    .scene { padding: 0 1.5rem; justify-content: flex-end; padding-bottom: 8rem; }
    body { overflow: auto; }
    .side-line { display: none; }
    .bottom-bar { padding: 1rem 1.5rem; flex-direction: column; gap: .5rem; text-align: center; }
  }
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<canvas id="three-canvas"></canvas>

<nav>
  <a href="#" class="nav-logo">7 SIGMA</a>
  <span class="nav-tag">// EN CONSTRUCCIÓN</span>
</nav>

<main class="scene">
  <p class="eyebrow">// ALGO ESTÁ TOMANDO FORMA</p>

  <h1 class="main-title">
    PRONTO
    <span class="outline-crimson">ESTAREMOS</span>
    <span class="outline-teal">AQUÍ</span>
  </h1>

  <p class="subtitle">
    Estamos construyendo algo preciso: siete desviaciones estándar de lo esperado.
    Visitanos en un tiempo
  </p>

  <div class="side-line"><span>7 SIGMA · 2026</span></div>
</main>

<footer class="bottom-bar">
  <span>© 2026 ESTUDIO 7SIGMA</span>
  <span>BUENOS AIRES · ARGENTINA</span>
  <a href="mailto:hola@7sigma.studio">ESTUDIO7SIGMA@GMAIL.COM</a>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─── CURSOR ───────────────────────────────────────────
const cursor = document.getElementById('cursor');
const ring   = document.getElementById('cursorRing');
let mx = -100, my = -100, rx = -100, ry = -100;
document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
(function animCursor() {
  rx += (mx - rx) * 0.12;
  ry += (my - ry) * 0.12;
  cursor.style.left = mx + 'px'; cursor.style.top = my + 'px';
  ring.style.left   = rx + 'px'; ring.style.top   = ry + 'px';
  requestAnimationFrame(animCursor);
})();

// ─── THREE.JS PARTÍCULAS ──────────────────────────────
(function() {
  const canvas   = document.getElementById('three-canvas');
  const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setSize(innerWidth, innerHeight);

  const scene  = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 1000);
  camera.position.z = 5;

  const COUNT = 6000;
  const geo   = new THREE.BufferGeometry();
  const pos   = new Float32Array(COUNT * 3);
  const col   = new Float32Array(COUNT * 3);
  const phase = new Float32Array(COUNT);

  const palette = [
    [0.11, 0.84, 0.75],
    [0.06, 0.63, 0.56],
    [0.78, 0.83, 0.88],
    [0.91, 0.93, 0.96],
    [0.07, 0.13, 0.25],
    [0.11, 0.20, 0.38],
  ];

  for (let i = 0; i < COUNT; i++) {
    const river = Math.floor(Math.random() * 4);
    const along = Math.random() * Math.PI * 6;
    let x, y;
    if (river === 0) {
      x = Math.sin(along * .3) * 3 + Math.cos(along * .7) * 1.5;
      y = along * .4 - 6;
    } else if (river === 1) {
      x = Math.cos(along * .2) * 2 - 2 + Math.sin(along * .5) * .8;
      y = along * .35 - 5;
    } else if (river === 2) {
      x = (Math.random() - .5) * 10;
      y = (Math.random() - .5) * 10;
    } else {
      const angle = Math.random() * Math.PI * .6 + Math.PI * .7;
      const r = Math.random() * 3;
      x = Math.cos(angle) * r + 2;
      y = Math.sin(angle) * r - 1;
    }
    pos[i*3]   = x + (Math.random() - .5) * .3;
    pos[i*3+1] = y + (Math.random() - .5) * .3;
    pos[i*3+2] = (Math.random() - .5) * 2;

    const isRiver = river < 2;
    const isLand  = river === 2;
    let c;
    if (isRiver)     c = Math.random() < .6 ? palette[2] : palette[3];
    else if (isLand) c = Math.random() < .5 ? palette[0] : palette[1];
    else             c = palette[4];

    col[i*3] = c[0]; col[i*3+1] = c[1]; col[i*3+2] = c[2];
    phase[i] = Math.random() * Math.PI * 2;
  }

  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('color',    new THREE.BufferAttribute(col, 3));

  const mat = new THREE.PointsMaterial({
    size: .022, vertexColors: true,
    transparent: true, opacity: .75,
    sizeAttenuation: true,
    blending: THREE.AdditiveBlending, depthWrite: false,
  });

  scene.add(new THREE.Points(geo, mat));
  const particles = scene.children[0];

  let mouseX = 0, mouseY = 0;
  document.addEventListener('mousemove', e => {
    mouseX = (e.clientX / innerWidth  - .5) * .5;
    mouseY = -(e.clientY / innerHeight - .5) * .5;
  });

  window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });

  let t = 0;
  (function animate() {
    requestAnimationFrame(animate);
    t += .003;
    const positions = geo.attributes.position.array;
    for (let i = 0; i < COUNT; i++) {
      const phi = phase[i];
      positions[i*3]   += Math.sin(t + phi)      * .0004;
      positions[i*3+1] += Math.cos(t * .7 + phi) * .0003;
    }
    geo.attributes.position.needsUpdate = true;
    particles.rotation.z += .0005;
    camera.position.x += (mouseX - camera.position.x) * .02;
    camera.position.y += (mouseY - camera.position.y) * .02;
    camera.lookAt(scene.position);
    renderer.render(scene, camera);
  })();
})();
</script>
</body>
</html>
